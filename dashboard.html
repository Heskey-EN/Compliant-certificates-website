<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Compliant Property Certificates</title>
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath d='M6 40V21L24 7l18 14' stroke='%233FAE76' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M16 17v-7h6v4' stroke='%233FAE76' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M6 40h17' stroke='%233FAE76' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ APP HEADER ============ -->
  <header class="app-header">
    <div class="container">
      <a href="index.html" class="logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M6 40V21L24 7l18 14" stroke="#3FAE76" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 17v-7h6v4" stroke="#3FAE76" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 40h17" stroke="#3FAE76" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">
          <span class="l1">Compliant Property</span>
          <span class="l2">Certificates</span>
        </span>
      </a>
      <div class="app-user">
        <span class="app-who">Signed in as <strong id="who">…</strong> <span class="role-badge" id="role-badge"></span></span>
        <button type="button" class="btn btn-outline btn-sm" id="logout-btn">Log out</button>
      </div>
    </div>
  </header>

  <main>
    <section class="section-tight">
      <div class="container">
        <div class="dash-head">
          <div>
            <h1>Dashboard</h1>
            <p class="lede" id="dash-intro">Loading…</p>
          </div>
          <button type="button" class="btn btn-primary" id="add-job-btn">+ Add job</button>
        </div>

        <div class="dash-grid">
          <div class="calendar-wrap">
            <div class="calendar-head">
              <button type="button" class="cal-nav" id="cal-prev" aria-label="Previous month">&lsaquo;</button>
              <h2 id="cal-label">…</h2>
              <button type="button" class="cal-nav" id="cal-next" aria-label="Next month">&rsaquo;</button>
            </div>
            <div class="calendar-dow">
              <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
          </div>

          <div class="job-panel">
            <div class="job-panel-head">
              <h2 id="job-panel-title">Upcoming jobs</h2>
              <button type="button" class="btn btn-outline btn-sm" id="clear-day" hidden>Show all</button>
            </div>
            <div id="job-list"><p class="job-empty">Loading…</p></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============ ADD JOB MODAL ============ -->
  <div class="modal-overlay" id="job-modal" hidden>
    <div class="modal-card">
      <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <h2>Add a job</h2>
      <form id="job-form" novalidate>
        <div class="field">
          <label for="job-postcode">Postcode</label>
          <div class="postcode-row">
            <input type="text" id="job-postcode" name="postcode" autocomplete="off" autocapitalize="characters" spellcheck="false" required>
            <button type="button" class="btn btn-outline btn-sm" id="postcode-find">Find</button>
          </div>
          <p class="postcode-note" id="postcode-note"></p>
        </div>
        <div class="field">
          <label for="job-address">Property address</label>
          <input type="text" id="job-address" name="address" placeholder="House / flat, street">
        </div>
        <div class="field">
          <label for="job-service">Service</label>
          <select id="job-service" name="service" required>
            <option value="">Select a service</option>
            <option value="EPC">EPC</option>
            <option value="EICR">EICR (Electrical)</option>
            <option value="Gas Safety">Gas Safety (CP12)</option>
            <option value="PAT">PAT Testing</option>
          </select>
        </div>
        <div class="form-grid cols-2">
          <div class="field">
            <label for="job-date">Date</label>
            <input type="date" id="job-date" name="job_date" required>
          </div>
          <div class="field">
            <label for="job-time">Time</label>
            <input type="time" id="job-time" name="job_time">
          </div>
        </div>
        <div class="field">
          <label for="job-notes">Notes (optional)</label>
          <textarea id="job-notes" name="notes" placeholder="Access details, contact on site, etc."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="job-save">Save job</button>
        <p class="form-note" id="job-form-note" role="status"></p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
